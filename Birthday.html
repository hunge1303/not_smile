<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Story About Mai</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&family=Special+Elite&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --cream:       #f7edd8;
      --parchment:   #ede0c4;
      --brown-light: #c4a882;
      --brown-mid:   #8b5e3c;
      --brown-dark:  #3d2b1f;
      --gold:        #c9a84c;
      --gold-light:  #e8cc7a;
      --shadow:      rgba(61,43,31,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--cream); color: var(--brown-dark); font-family: 'Lora', Georgia, serif; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }

    /* ─── Chapter system ─── */
    .chapter { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 1.2s ease; }
    .chapter.active  { opacity: 1; pointer-events: all; }
    .chapter.fade-out { opacity: 0; pointer-events: none; }
    .parchment-bg {
      background: radial-gradient(ellipse at 20% 20%, #f0ddb8 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, #e8d0a8 0%, transparent 55%), radial-gradient(ellipse at 50% 50%, #f7edd8 0%, #ede0c4 100%);
    }

    /* ═══ CH1 — OPENING ════════════════════════════ */
    #ch1 { z-index: 10; }
    #particles-canvas { position: absolute; inset: 0; pointer-events: none; }
    .ch1-content { position: relative; z-index: 2; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.6rem; }
    .flourish    { font-size: 1.4rem; color: var(--brown-light); letter-spacing: 0.6em; opacity: 0; animation: fadeUp 1s ease 0.3s forwards; }
    .ch1-subtitle { font-family: 'Lora', serif; font-style: italic; font-size: clamp(0.85rem,2vw,1rem); color: var(--brown-light); letter-spacing: 0.18em; text-transform: uppercase; opacity: 0; animation: fadeUp 1s ease 0.8s forwards; }
    .ch1-title   { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem,7vw,5.5rem); font-weight: 700; line-height: 1.1; color: var(--brown-dark); opacity: 0; animation: fadeUp 1.2s ease 1.3s forwards; }
    .ch1-title em { font-style: italic; color: var(--brown-mid); }
    .ch1-divider { width: 120px; height: 1px; background: linear-gradient(90deg,transparent,var(--brown-light),transparent); opacity: 0; animation: fadeIn 1s ease 2.2s forwards; }
    .ch1-tagline { font-family: 'Lora', serif; font-style: italic; font-size: clamp(0.9rem,2.2vw,1.1rem); color: var(--brown-mid); opacity: 0; animation: fadeUp 1s ease 2.4s forwards; }
    .btn-start { margin-top: 0.8rem; padding: 0.85rem 2.8rem; font-family: 'Special Elite', cursive; font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cream); background: var(--brown-mid); border: none; border-radius: 2px; cursor: pointer; position: relative; overflow: hidden; opacity: 0; animation: fadeUp 1s ease 3s forwards; transition: background 0.3s, transform 0.2s, box-shadow 0.3s; box-shadow: 0 4px 20px var(--shadow); }
    .btn-start::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 50%); pointer-events: none; }
    .btn-start:hover  { background: var(--brown-dark); transform: translateY(-2px); box-shadow: 0 8px 28px var(--shadow); }
    .btn-start:active { transform: translateY(0); }
    .btn-start.pulse  { animation: fadeUp 1s ease 3s forwards, btnPulse 2.5s ease 4.2s infinite; }
    .corner { position: absolute; width: 60px; height: 60px; border-color: var(--brown-light); border-style: solid; opacity: 0.4; }
    .corner-tl { top:28px; left:28px;   border-width: 1.5px 0 0 1.5px; }
    .corner-tr { top:28px; right:28px;  border-width: 1.5px 1.5px 0 0; }
    .corner-bl { bottom:28px; left:28px;  border-width: 0 0 1.5px 1.5px; }
    .corner-br { bottom:28px; right:28px; border-width: 0 1.5px 1.5px 0; }

    /* ═══ CH2 — TYPING ══════════════════════════════ */
    #ch2 { z-index: 9; }
    .ch2-content { max-width: min(680px,88vw); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2.4rem; }
    .ch2-label { font-family: 'Special Elite', cursive; font-size: 0.78rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--brown-light); }
    .ch2-text { font-family: 'Lora', serif; font-style: italic; font-size: clamp(1.1rem,2.8vw,1.45rem); line-height: 1.85; color: var(--brown-dark); min-height: 7em; }
    .cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--brown-mid); margin-left: 2px; vertical-align: middle; animation: blink 0.85s step-end infinite; }
    .ch2-scroll-hint { font-family: 'Lora', serif; font-size: 0.82rem; letter-spacing: 0.15em; color: var(--brown-light); opacity: 0; transition: opacity 1s ease; }
    .ch2-scroll-hint.visible { opacity: 1; }

    /* Progress dots */
    .progress-dots { position: fixed; bottom: 32px; display: flex; gap: 10px; z-index: 20; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brown-light); opacity: 0.35; transition: opacity 0.4s, background 0.4s; }
    .dot.active { background: var(--brown-mid); opacity: 1; }

    /* ═══ CH3 — CAKE ════════════════════════════════ */
    #ch3 { z-index: 8; justify-content: center; gap: 0; }
    .ch3-header { text-align: center; margin-bottom: 1.2rem; transition: opacity 0.5s ease; }
    .ch3-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem,3.5vw,2rem); font-weight: 400; font-style: italic; color: var(--brown-dark); }
    .ch3-hint { margin-top: 1.4rem; font-family: 'Lora', serif; font-style: italic; font-size: clamp(0.8rem,2vw,0.92rem); color: var(--brown-light); letter-spacing: 0.08em; animation: gentlePulse 3s ease-in-out infinite; transition: opacity 0.5s ease; }
    .cake-wrapper { position: relative; width: min(560px,92vw); display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .cake-wrapper:hover #cakeSvg { filter: drop-shadow(0 0 18px rgba(201,168,76,0.38)); }
    #cakeSvg { transition: filter 0.4s ease; }

    /* ═══ MUSIC BUTTON ══════════════════════════════ */
    #musicBtn { position: fixed; top: 22px; right: 22px; z-index: 500; width: 40px; height: 40px; border-radius: 50%; background: rgba(61,43,31,0.12); border: 1px solid var(--brown-light); color: var(--brown-mid); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.6s ease, background 0.25s, transform 0.2s; backdrop-filter: blur(4px); }
    #musicBtn.show { opacity: 1; pointer-events: all; }
    #musicBtn:hover { background: rgba(61,43,31,0.22); transform: scale(1.08); }

    /* ═══ CH4 — CD PLAYER ═══════════════════════════ */
    #ch4 {
      z-index: 12;
      background: radial-gradient(ellipse at 30% 25%, #f0ddb8 0%, transparent 55%), radial-gradient(ellipse at 70% 75%, #e8d0a8 0%, transparent 55%), radial-gradient(ellipse at 50% 50%, #f7edd8 0%, #ede0c4 100%);
    }

    .cd-scene { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; opacity: 0; transform: scale(0.35); transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.34,1.28,0.64,1); }
    .cd-scene.show { opacity: 1; transform: scale(1); }

    .cd-disc { position: relative; width: min(240px,52vw); height: min(240px,52vw); border-radius: 50%; box-shadow: 0 8px 40px rgba(61,43,31,0.28), 0 2px 8px rgba(61,43,31,0.14); flex-shrink: 0; }
    .cd-disc svg { width: 100%; height: 100%; display: block; border-radius: 50%; }
    .cd-disc.spinning { animation: cdSpin 4s linear infinite; }

    .cd-info { text-align: center; display: flex; flex-direction: column; gap: 0.4rem; transition: opacity 0.6s ease; }
    .cd-info-label { font-family: 'Special Elite', cursive; font-size: 0.72rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--brown-light); }
    .cd-info-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1rem,2.8vw,1.3rem); color: var(--brown-dark); }

    .cd-wave-wrap { width: min(280px,72vw); height: 40px; }
    #waveCanvas { width: 100%; height: 100%; display: block; }

    .cd-play-btn { width: 54px; height: 54px; border-radius: 50%; background: var(--brown-mid); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--cream); font-size: 1.3rem; box-shadow: 0 4px 18px var(--shadow); transition: background 0.25s, transform 0.18s, box-shadow 0.25s; flex-shrink: 0; }
    .cd-play-btn:hover  { background: var(--brown-dark); transform: scale(1.07); box-shadow: 0 6px 24px var(--shadow); }
    .cd-play-btn:active { transform: scale(0.96); }
    .cd-controls { display: flex; align-items: center; gap: 1.4rem; }

    /* ═══ KEYFRAMES ══════════════════════════════════ */
    @keyframes fadeUp  { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes blink   { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes btnPulse { 0%,100% { box-shadow:0 4px 20px var(--shadow); } 50% { box-shadow:0 4px 32px rgba(139,94,60,0.45); } }
    @keyframes gentlePulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
    @keyframes flameFlicker { 0%,100% { transform:scaleX(1) scaleY(1); } 25% { transform:scaleX(0.92) scaleY(1.08); } 50% { transform:scaleX(1.08) scaleY(0.94); } 75% { transform:scaleX(0.95) scaleY(1.06); } }
    @keyframes glowPulse { 0%,100% { opacity:0.6; } 50% { opacity:0.95; } }
    @keyframes cdSpin  { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ══ CH1 — OPENING ══════════════════════════ -->
  <section id="ch1" class="chapter parchment-bg active">
    <canvas id="particles-canvas"></canvas>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="ch1-content">
      <p class="flourish">✦ &nbsp;&nbsp; ✦ &nbsp;&nbsp; ✦</p>
      <p class="ch1-subtitle">a present for</p>
      <h1 class="ch1-title"><em>Mai</em></h1>
      <div class="ch1-divider"></div>
      <p class="ch1-tagline">Lesgo</p>
      <button class="btn-start pulse" onclick="startJourney()">▶ &nbsp; Begin</button>
    </div>
  </section>

  <!-- ══ CH2 — TYPING ═══════════════════════════ -->
  <section id="ch2" class="chapter parchment-bg">
    <div class="ch2-content">
      <p class="ch2-label">a letter</p>
      <p class="ch2-text" id="typingText"><span class="cursor"></span></p>
      <p class="ch2-scroll-hint" id="scrollHint">continuing in a moment&hellip;</p>
    </div>
  </section>

  <!-- Progress dots -->
  <div class="progress-dots" id="progressDots">
    <div class="dot active" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
  </div>

  <!-- ══ CH3 — CAKE ═════════════════════════════ -->
  <section id="ch3" class="chapter parchment-bg">

    <div class="ch3-header">
      <h2 id="cakeHeading">Make a wish&hellip;</h2>
    </div>

    <div class="cake-wrapper" id="cakeWrapper" onclick="handleCakeClick()">
      <svg id="cakeSvg" viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
        <defs>
          <radialGradient id="flame1" cx="50%" cy="80%" r="50%"><stop offset="0%" stop-color="#fff5c0"/><stop offset="40%" stop-color="#ffc94a"/><stop offset="100%" stop-color="#e05c00" stop-opacity="0"/></radialGradient>
          <radialGradient id="flame2" cx="50%" cy="80%" r="50%"><stop offset="0%" stop-color="#fff5c0"/><stop offset="40%" stop-color="#ffc94a"/><stop offset="100%" stop-color="#e05c00" stop-opacity="0"/></radialGradient>
          <radialGradient id="flame3" cx="50%" cy="80%" r="50%"><stop offset="0%" stop-color="#fff5c0"/><stop offset="40%" stop-color="#ffc94a"/><stop offset="100%" stop-color="#e05c00" stop-opacity="0"/></radialGradient>
          <radialGradient id="flameGold" cx="50%" cy="80%" r="50%"><stop offset="0%" stop-color="#fffde0"/><stop offset="40%" stop-color="#f5c842"/><stop offset="100%" stop-color="#b8860b" stop-opacity="0"/></radialGradient>
          <linearGradient id="frostingGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f9f0dc"/><stop offset="100%" stop-color="#e8d6b0"/></linearGradient>
          <linearGradient id="cakeBodyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4956a"/><stop offset="100%" stop-color="#a0623a"/></linearGradient>
          <linearGradient id="cakeLayer2Grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4844e"/><stop offset="100%" stop-color="#8b5230"/></linearGradient>
          <filter id="candleShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(61,43,31,0.2)"/></filter>
          <radialGradient id="glowGrad1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffc94a" stop-opacity="0.7"/><stop offset="100%" stop-color="#ffc94a" stop-opacity="0"/></radialGradient>
          <radialGradient id="glowGradGold" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#f5c842" stop-opacity="0.8"/><stop offset="100%" stop-color="#f5c842" stop-opacity="0"/></radialGradient>
        </defs>
        <!-- Plate -->
        <ellipse cx="210" cy="278" rx="155" ry="14" fill="#d9c59a" opacity="0.6"/>
        <ellipse cx="210" cy="276" rx="148" ry="10" fill="#e8d6a8" opacity="0.8"/>
        <!-- Bottom tier -->
        <rect x="70" y="200" width="280" height="75" rx="4" fill="url(#cakeBodyGrad)"/>
        <path d="M70,200 Q85,188 100,200 Q115,188 130,200 Q145,188 160,200 Q175,188 190,200 Q205,188 220,200 Q235,188 250,200 Q265,188 280,200 Q295,188 310,200 Q325,188 340,200 Q355,188 350,200 L350,208 L70,208 Z" fill="url(#frostingGrad)"/>
        <circle cx="105" cy="235" r="4" fill="#f9f0dc" opacity="0.5"/><circle cx="155" cy="245" r="3" fill="#f9f0dc" opacity="0.4"/><circle cx="210" cy="230" r="5" fill="#f9f0dc" opacity="0.5"/><circle cx="265" cy="242" r="3" fill="#f9f0dc" opacity="0.4"/><circle cx="315" cy="233" r="4" fill="#f9f0dc" opacity="0.5"/>
        <line x1="130" y1="220" x2="144" y2="220" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
        <line x1="240" y1="255" x2="254" y2="255" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
        <!-- Top tier -->
        <rect x="115" y="135" width="190" height="70" rx="4" fill="url(#cakeLayer2Grad)"/>
        <path d="M115,135 Q127,123 139,135 Q151,123 163,135 Q175,123 187,135 Q199,123 211,135 Q223,123 235,135 Q247,123 259,135 Q271,123 283,135 Q295,123 305,135 L305,143 L115,143 Z" fill="url(#frostingGrad)"/>
        <circle cx="148" cy="162" r="3.5" fill="#f9f0dc" opacity="0.5"/><circle cx="210" cy="155" r="4.5" fill="#f9f0dc" opacity="0.55"/><circle cx="272" cy="165" r="3" fill="#f9f0dc" opacity="0.45"/>
        <text x="210" y="175" text-anchor="middle" font-family="'Special Elite', cursive" font-size="11" fill="#3d2b1f" opacity="0.55" letter-spacing="1">Happy Birthday</text>
        <!-- Candle 1 -->
        <g id="candle1" filter="url(#candleShadow)">
          <rect x="146" y="84" width="14" height="55" rx="3" fill="#e8a87c" stroke="#c4724a" stroke-width="0.8"/>
          <line x1="146" y1="100" x2="160" y2="100" stroke="#c4724a" stroke-width="1.5" opacity="0.4"/>
          <line x1="146" y1="116" x2="160" y2="116" stroke="#c4724a" stroke-width="1.5" opacity="0.4"/>
          <line x1="153" y1="84" x2="153" y2="78" stroke="#3d2b1f" stroke-width="1.5" stroke-linecap="round"/>
          <circle id="glow1" cx="153" cy="72" r="12" fill="url(#glowGrad1)" opacity="0"/>
          <ellipse id="flame1-shape" cx="153" cy="73" rx="5" ry="8" fill="url(#flame1)" opacity="0" style="transform-origin:153px 80px;transform-box:fill-box;"/>
        </g>
        <!-- Candle 2 -->
        <g id="candle2" filter="url(#candleShadow)">
          <rect x="184" y="78" width="14" height="60" rx="3" fill="#a8c4a0" stroke="#7aa870" stroke-width="0.8"/>
          <line x1="184" y1="94" x2="198" y2="94" stroke="#7aa870" stroke-width="1.5" opacity="0.4"/>
          <line x1="184" y1="110" x2="198" y2="110" stroke="#7aa870" stroke-width="1.5" opacity="0.4"/>
          <line x1="191" y1="78" x2="191" y2="72" stroke="#3d2b1f" stroke-width="1.5" stroke-linecap="round"/>
          <circle id="glow2" cx="191" cy="66" r="12" fill="url(#glowGrad1)" opacity="0"/>
          <ellipse id="flame2-shape" cx="191" cy="67" rx="5" ry="8" fill="url(#flame2)" opacity="0" style="transform-origin:191px 74px;transform-box:fill-box;"/>
        </g>
        <!-- Candle 3 -->
        <g id="candle3" filter="url(#candleShadow)">
          <rect x="222" y="80" width="14" height="58" rx="3" fill="#b8a8d4" stroke="#8a78b0" stroke-width="0.8"/>
          <line x1="222" y1="96" x2="236" y2="96" stroke="#8a78b0" stroke-width="1.5" opacity="0.4"/>
          <line x1="222" y1="112" x2="236" y2="112" stroke="#8a78b0" stroke-width="1.5" opacity="0.4"/>
          <line x1="229" y1="80" x2="229" y2="74" stroke="#3d2b1f" stroke-width="1.5" stroke-linecap="round"/>
          <circle id="glow3" cx="229" cy="68" r="12" fill="url(#glowGrad1)" opacity="0"/>
          <ellipse id="flame3-shape" cx="229" cy="69" rx="5" ry="8" fill="url(#flame3)" opacity="0" style="transform-origin:229px 76px;transform-box:fill-box;"/>
        </g>
        <!-- Candle 4 (gold) -->
        <g id="candle4" filter="url(#candleShadow)">
          <rect x="259" y="75" width="16" height="63" rx="3" fill="#f0d060" stroke="#c9a020" stroke-width="1"/>
          <line x1="259" y1="91" x2="275" y2="91" stroke="#c9a020" stroke-width="1.8" opacity="0.5"/>
          <line x1="259" y1="108" x2="275" y2="108" stroke="#c9a020" stroke-width="1.8" opacity="0.5"/>
          <text x="267" y="103" text-anchor="middle" font-size="9" fill="#8b6000" opacity="0.6">★</text>
          <line x1="267" y1="75" x2="267" y2="68" stroke="#3d2b1f" stroke-width="1.5" stroke-linecap="round"/>
          <circle id="glow4" cx="267" cy="62" r="15" fill="url(#glowGradGold)" opacity="0"/>
          <ellipse id="flame4-shape" cx="267" cy="63" rx="6" ry="10" fill="url(#flameGold)" opacity="0" style="transform-origin:267px 71px;transform-box:fill-box;"/>
        </g>
      </svg>
    </div>

    <p class="ch3-hint" id="cakeHint">click on the cake to light up the candles</p>
  </section>

  <!-- ══ CH4 — CD MUSIC PLAYER ══════════════════ -->
  <section id="ch4" class="chapter">
    <div class="cd-scene" id="cdScene">

      <!-- The CD -->
      <div class="cd-disc" id="cdDisc">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <defs>
            <radialGradient id="cdBase" cx="50%" cy="50%" r="50%">
              <stop offset="0%"  stop-color="#2a1f14"/>
              <stop offset="37%" stop-color="#1a1209"/>
              <stop offset="38%" stop-color="#3a2818"/>
              <stop offset="64%" stop-color="#1e1409"/>
              <stop offset="65%" stop-color="#352214"/>
              <stop offset="100%" stop-color="#1a1209"/>
            </radialGradient>
            <radialGradient id="cdSheen" cx="35%" cy="30%" r="60%">
              <stop offset="0%"   stop-color="rgba(201,168,76,0.3)"/>
              <stop offset="30%"  stop-color="rgba(160,120,210,0.15)"/>
              <stop offset="65%"  stop-color="rgba(80,170,230,0.12)"/>
              <stop offset="100%" stop-color="rgba(201,168,76,0.04)"/>
            </radialGradient>
            <clipPath id="photoClip"><circle cx="100" cy="100" r="37"/></clipPath>
          </defs>
          <!-- Disc body -->
          <circle cx="100" cy="100" r="100" fill="url(#cdBase)"/>
          <!-- Groove rings -->
          <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
          <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
          <circle cx="100" cy="100" r="66" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
          <circle cx="100" cy="100" r="54" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.7"/>
          <circle cx="100" cy="100" r="42" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="1.2"/>
          <!-- Iridescent sheen -->
          <circle cx="100" cy="100" r="100" fill="url(#cdSheen)"/>
          <!-- Photo (update href to your image path) -->
          <image id="cdPhotoEl" href="smile/_DDA2194.jpg"
                 x="63" y="63" width="74" height="74"
                 clip-path="url(#photoClip)"
                 preserveAspectRatio="xMidYMid slice"/>
          <!-- Photo ring border -->
          <circle cx="100" cy="100" r="37" fill="none" stroke="rgba(201,168,76,0.55)" stroke-width="1.5"/>
          <!-- Centre hole -->
          <circle cx="100" cy="100" r="8" fill="#f0e8d5"/>
          <circle cx="100" cy="100" r="3.5" fill="rgba(61,43,31,0.4)"/>
        </svg>
      </div>

      <!-- Song info text -->
      <div class="cd-info" id="cdInfo">
        <p class="cd-info-label" id="cdInfoLabel">for you</p>
        <p class="cd-info-title" id="cdInfoTitle">To you, by Hazbin…</p>
      </div>

      <!-- Waveform -->
      <div class="cd-wave-wrap">
        <canvas id="waveCanvas"></canvas>
      </div>

      <!-- Play button -->
      <div class="cd-controls">
        <button class="cd-play-btn" id="playBtn" onclick="handlePlay()">▶</button>
      </div>

    </div>
  </section>

  <!-- Music toggle button -->
  <button id="musicBtn" onclick="toggleMute()" title="Toggle music">🎵</button>

  <!-- Background ambient music -->
  <audio id="bgMusic" loop>
    <source src="Hunge kat wtf.mp3" type="audio/mpeg"/>
  </audio>

  <!-- CD song -->
  <audio id="cdMusic">
    <source src="https://res.cloudinary.com/dklegjccm/video/upload/v1775528198/music_qeworn.wav" type="audio/mpeg"/>
  </audio>


  <script>
    /* ══════════════════════════════════════════════════
       CONFIG  — update these values!
    ══════════════════════════════════════════════════ */
    const CONFIG = {
      friendName: "Mai",
      typingMessage:
        "To you, on this very special day...\n\n" +
        "Some people walk into your life quietly, " +
        "and somehow end up making all the noise that matters. " +
        "You are one of those people. " +
        "This is a small piece of everything you mean to me.",
      typingSpeed:     42,
      pauseAfterTyping: 3000,
      cdPhoto: "https://github.com/hunge1303/not_smile/blob/main/smile/_DDA2194.jpg",   // ← put the path to your photo here
    };

    /* ─── Particles (ch1) ───────────────────────── */
    const cvs = document.getElementById('particles-canvas');
    const ctx = cvs.getContext('2d');
    let particles = [];
    function resizeCvs() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
    resizeCvs(); window.addEventListener('resize', resizeCvs);
    function mkP() { return { x:Math.random()*cvs.width, y:Math.random()*cvs.height, r:Math.random()*1.8+0.4, vx:(Math.random()-0.5)*0.25, vy:-(Math.random()*0.35+0.1), op:Math.random()*0.35+0.08, life:Math.random()*200+80, age:0 }; }
    for(let i=0;i<60;i++) particles.push(mkP());
    function drawP() {
      ctx.clearRect(0,0,cvs.width,cvs.height);
      particles.forEach((p,i)=>{ p.x+=p.vx; p.y+=p.vy; p.age++; const f=p.age<30?p.age/30:p.age>p.life-30?(p.life-p.age)/30:1; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(139,94,60,${p.op*f})`; ctx.fill(); if(p.age>=p.life)particles[i]=mkP(); });
      requestAnimationFrame(drawP);
    }
    drawP();

    /* ─── Chapter transitions ───────────────────── */
    function showChapter(fromId, toId, dotIdx) {
      const f = document.getElementById(fromId), t = document.getElementById(toId);
      f.classList.add('fade-out');
      setTimeout(() => { f.classList.remove('active','fade-out'); t.classList.add('active'); updateDots(dotIdx); }, 1300);
    }
    function updateDots(idx) { document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx)); }

    /* ─── Audio helpers ─────────────────────────── */
    function fadeInAudio(audio, target, ms) {
      const steps=40, iv=ms/steps, inc=target/steps; let s=0;
      const id=setInterval(()=>{ s++; audio.volume=Math.min(target,audio.volume+inc); if(s>=steps)clearInterval(id); },iv);
    }
    function fadeOutAudio(audio, ms) {
      const start=audio.volume, steps=30, iv=ms/steps, dec=start/steps; let s=0;
      const id=setInterval(()=>{ s++; audio.volume=Math.max(0,audio.volume-dec); if(s>=steps){audio.pause();clearInterval(id);}},iv);
    }

    /* ─── Start Journey (ch1 → ch2) ─────────────── */
    function startJourney() {
      // Unlock audio context on user gesture
      const bg = document.getElementById('bgMusic');
      bg.volume = 0;
      bg.play().then(()=>bg.pause()).catch(()=>{});
      showChapter('ch1','ch2',1);
      setTimeout(()=>startTyping(), 1500);
    }

    /* ─── Typing animation ──────────────────────── */
    function startTyping() {
      const el = document.getElementById('typingText');
      const hint = document.getElementById('scrollHint');
      const msg  = CONFIG.typingMessage;
      let i = 0;
      el.innerHTML = '<span class="cursor"></span>';
      function next() {
        if(i>=msg.length){ hint.classList.add('visible'); setTimeout(goToCake, CONFIG.pauseAfterTyping); return; }
        const ch = msg[i], cur = el.querySelector('.cursor');
        if(ch==='\n'){ cur.insertAdjacentHTML('beforebegin','<br/>'); i++; setTimeout(next,CONFIG.typingSpeed*5); return; }
        cur.insertAdjacentText('beforebegin',ch); i++;
        setTimeout(next, CONFIG.typingSpeed+(Math.random()*18-9));
      }
      next();
    }

    /* ─── Go to Cake (ch2 → ch3) ───────────────── */
    function goToCake() {
      showChapter('ch2','ch3',2);
      const bg = document.getElementById('bgMusic');
      bg.volume = 0; bg.play().catch(()=>{});
      fadeInAudio(bg, 0.45, 2500);
      setTimeout(()=>document.getElementById('musicBtn').classList.add('show'), 2000);
    }

    /* ─── Cake click — two-step flow ────────────── */
    let candlesLit = false;

    function handleCakeClick() {
      if (!candlesLit) {
        // First click: light all candles one by one
        [1,2,3,4].forEach((n,idx) => setTimeout(()=>lightCandle(n), idx*200));
        candlesLit = true;
        // Update hint text
        const hint = document.getElementById('cakeHint');
        hint.style.opacity = '0';
        setTimeout(() => { hint.textContent = 'click on the cake again ✨'; hint.style.opacity = '1'; }, 500);
      } else {
        // Second click: shrink cake → CD page
        shrinkThenOpen();
      }
    }

    function lightCandle(num) {
      const flame = document.getElementById(`flame${num}-shape`);
      const glow  = document.getElementById(`glow${num}`);
      if(flame){ flame.style.opacity='1'; flame.style.animation=`flameFlicker ${0.9+Math.random()*0.4}s ease-in-out infinite alternate`; }
      if(glow) { glow.style.opacity='0.78'; glow.style.animation=`glowPulse ${1.4+Math.random()*0.6}s ease-in-out infinite`; }
    }

    /* ─── Shrink cake → CD page ─────────────────── */
    function shrinkThenOpen() {
      const wrapper = document.getElementById('cakeWrapper');
      const heading = document.getElementById('cakeHeading');
      const hint    = document.getElementById('cakeHint');

      // Fade text
      heading.style.transition = 'opacity 0.4s ease';
      hint.style.transition    = 'opacity 0.4s ease';
      heading.style.opacity    = '0';
      hint.style.opacity       = '0';

      // Shrink cake
      wrapper.style.transition       = 'transform 0.75s cubic-bezier(0.55,0,1,0.45), opacity 0.75s ease';
      wrapper.style.transformOrigin  = 'center center';
      wrapper.style.transform        = 'scale(0.04)';
      wrapper.style.opacity          = '0';

      setTimeout(() => openCDPage(), 850);
    }

    /* ─── Open CD page ──────────────────────────── */
    function openCDPage() {
      // Sync photo path from config
      document.getElementById('cdPhotoEl').setAttribute('href', CONFIG.cdPhoto);

      const ch3 = document.getElementById('ch3');
      const ch4 = document.getElementById('ch4');
      ch3.classList.add('fade-out');
      setTimeout(() => {
        ch3.classList.remove('active','fade-out');
        ch4.classList.add('active');
        updateDots(3);
        setTimeout(() => { document.getElementById('cdScene').classList.add('show'); drawWave(false); }, 80);
      }, 700);
    }

    /* ─── Music toggle ──────────────────────────── */
    let isMuted = false;
    function toggleMute() {
      const bg = document.getElementById('bgMusic');
      isMuted = !isMuted;
      bg.muted = isMuted;
      document.getElementById('musicBtn').textContent = isMuted ? '🔇' : '🎵';
    }

    /* ─── CD Play / Pause ───────────────────────── */
    let isPlaying  = false;
    let waveAnimId = null;

    function handlePlay() {
      const cd  = document.getElementById('cdMusic');
      const bg  = document.getElementById('bgMusic');
      const disc = document.getElementById('cdDisc');
      const btn  = document.getElementById('playBtn');

      if (isPlaying) {
        cd.pause();
        disc.classList.remove('spinning');
        btn.textContent = '▶';
        cancelAnimationFrame(waveAnimId);
        drawWave(false);
        isPlaying = false;
      } else {
        // Fade out background music, start CD song
        fadeOutAudio(bg, 1200);
        cd.volume = 0;
        cd.play().catch(()=>{});
        fadeInAudio(cd, 0.9, 1000);

        disc.classList.add('spinning');
        btn.textContent = '⏸';

        // Swap info text
        const label = document.getElementById('cdInfoLabel');
        const title = document.getElementById('cdInfoTitle');
        const info  = document.getElementById('cdInfo');
        info.style.opacity = '0';
        setTimeout(() => {
          label.textContent = 'now playing';
          title.textContent = 'Phép màu ft. Hazbin';
          info.style.opacity = '1';
        }, 600);

        animateWave();
        isPlaying = true;
      }
    }

    /* ─── Waveform canvas ───────────────────────── */
    function drawWave(pulse) {
      const el  = document.getElementById('waveCanvas');
      const w   = el.offsetWidth  || 280;
      const h   = el.offsetHeight || 40;
      el.width  = w; el.height = h;
      const c   = el.getContext('2d');
      c.clearRect(0,0,w,h);
      c.beginPath();
      c.strokeStyle = '#8b5e3c';
      c.lineWidth   = 1.8;
      c.globalAlpha = 0.7;
      if (!pulse) {
        c.moveTo(0, h/2); c.lineTo(w, h/2);
      } else {
        const t = Date.now() / 180;
        c.moveTo(0, h/2);
        for (let x=0; x<w; x++) {
          const y = h/2 + Math.sin(x*0.045+t) * (h*0.36) * Math.sin(x*0.012+t*0.4);
          c.lineTo(x, y);
        }
      }
      c.stroke();
    }

    function animateWave() {
      drawWave(true);
      waveAnimId = requestAnimationFrame(animateWave);
    }
  </script>
</body>
</html>
